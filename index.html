<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>93.3 Infinite Radio — Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#eef1f6;
    --bg-1:#ffffff;
    --ink:#101827;
    --mist:#667085;
    --blue:#1e40e0;
    --blue-2:#3d6bff;
    --red:#e01e3c;
    --red-2:#ff3355;
    --line:rgba(16,24,39,0.09);
    --glass:rgba(255,255,255,0.72);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    -webkit-user-select:none;
    -moz-user-select:none;
    user-select:none;
    -webkit-touch-callout:none;
  }
  body{
    min-height:100vh;
    min-height:100svh;
    background:var(--bg-0);
    color:var(--ink);
    font-family:'Inter', Arial, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:26px 16px;
    position:relative;
    overflow-x:hidden;
  }

  .glow{
    position:fixed;
    border-radius:50%;
    filter:blur(100px);
    opacity:0.35;
    pointer-events:none;
    z-index:0;
  }
  .glow-1{
    width:520px;height:520px;
    background:radial-gradient(circle, var(--blue-2), transparent 65%);
    top:-200px; left:-160px;
    animation:drift1 16s ease-in-out infinite;
  }
  .glow-2{
    width:460px;height:460px;
    background:radial-gradient(circle, var(--red-2), transparent 65%);
    bottom:-220px; right:-140px;
    animation:drift2 19s ease-in-out infinite;
  }
  @keyframes drift1{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(50px,40px) scale(1.15);}
  }
  @keyframes drift2{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(-50px,-30px) scale(1.1);}
  }

  .console{
    position:relative;
    z-index:2;
    width:100%;
    max-width:460px;
    background:var(--glass);
    border:1px solid var(--line);
    border-radius:26px;
    backdrop-filter:blur(22px) saturate(160%);
    -webkit-backdrop-filter:blur(22px) saturate(160%);
    box-shadow:0 30px 70px rgba(16,24,39,0.14), inset 0 1px 0 rgba(255,255,255,0.9);
    overflow:hidden;
    animation:rise 0.7s cubic-bezier(.16,1,.3,1) both;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(24px) scale(0.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .console::before{
    content:"";
    display:block;
    height:4px;
    background:linear-gradient(90deg, var(--blue) 0 33%, #ffffff 33% 66%, var(--red) 66% 100%);
  }

  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:20px 24px 0;
  }
  .brand-mark{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark .dot-flag{
    width:34px;height:34px;
    border-radius:10px;
    background:linear-gradient(135deg, var(--blue), var(--red) 130%);
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    font-family:'Sora',sans-serif;
    font-weight:800;
    font-size:13px;
    box-shadow:0 6px 16px rgba(30,64,224,0.3);
  }
  .brand-text{
    font-family:'Sora', sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:0.01em;
  }
  .brand-sub{
    font-size:11px;
    color:var(--mist);
    letter-spacing:0.04em;
    margin-top:1px;
  }
  .live-chip{
    display:flex;align-items:center;gap:6px;
    background:rgba(224,30,60,0.09);
    border:1px solid rgba(224,30,60,0.35);
    color:var(--red);
    padding:5px 11px 5px 8px;
    border-radius:999px;
    font-size:10.5px;
    font-weight:700;
    letter-spacing:0.1em;
    text-transform:uppercase;
  }
  .live-chip .r-dot{
    width:6px;height:6px;border-radius:50%;
    background:var(--red);
    animation:ping 1.5s infinite;
  }
  @keyframes ping{
    0%{box-shadow:0 0 0 0 rgba(224,30,60,0.55);}
    70%{box-shadow:0 0 0 8px rgba(224,30,60,0);}
    100%{box-shadow:0 0 0 0 rgba(224,30,60,0);}
  }

  .clock-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    padding:16px 24px 0;
    font-family:'JetBrains Mono', monospace;
  }
  .clock-time{
    font-size:22px;
    font-weight:600;
    letter-spacing:0.02em;
    color:var(--blue);
  }
  .clock-date{
    font-size:11.5px;
    color:var(--mist);
    letter-spacing:0.04em;
  }

  .hero{
    padding:14px 24px 6px;
  }
  .freq-ticker{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--blue);
    letter-spacing:0.14em;
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:10px;
    opacity:0.9;
  }
  .freq-ticker::before{
    content:"";
    width:14px;height:1px;
    background:var(--blue);
    display:inline-block;
  }
  .station-title{
    font-family:'Sora', sans-serif;
    font-weight:800;
    font-size:clamp(26px, 6vw, 32px);
    line-height:1.05;
    letter-spacing:-0.01em;
  }
  .station-title span{
    background:linear-gradient(90deg, var(--blue), var(--red));
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .station-loc{
    color:var(--mist);
    font-size:13px;
    margin-top:6px;
  }

  /* equalizer — reacts to live audio when available, ambient otherwise */
  .eq{
    display:flex;
    align-items:flex-end;
    justify-content:center;
    gap:4px;
    height:34px;
    margin:20px 0 4px;
  }
  .eq span{
    flex:1;
    max-width:14px;
    background:linear-gradient(180deg, var(--blue-2), var(--blue));
    border-radius:3px;
    height:6px;
    transition:height 0.09s ease-out;
  }
  .eq span:nth-child(odd){background:linear-gradient(180deg, var(--red-2), var(--red));}
  .eq.ambient span{animation:eqbeat 1.1s ease-in-out infinite;}
  .eq.ambient span:nth-child(1){animation-delay:0s;}
  .eq.ambient span:nth-child(2){animation-delay:0.12s;}
  .eq.ambient span:nth-child(3){animation-delay:0.24s;}
  .eq.ambient span:nth-child(4){animation-delay:0.36s;}
  .eq.ambient span:nth-child(5){animation-delay:0.48s;}
  .eq.ambient span:nth-child(6){animation-delay:0.3s;}
  .eq.ambient span:nth-child(7){animation-delay:0.18s;}
  .eq.ambient span:nth-child(8){animation-delay:0.06s;}
  .eq.ambient span:nth-child(9){animation-delay:0.4s;}
  .eq.ambient span:nth-child(10){animation-delay:0.2s;}
  @keyframes eqbeat{
    0%,100%{height:6px;}
    50%{height:32px;}
  }

  .screen{
    margin:18px 24px 0;
    border-radius:16px;
    overflow:hidden;
    border:1px solid var(--line);
    background:#0b0e14;
    box-shadow:0 20px 40px rgba(16,24,39,0.18);
    position:relative;
  }
  .screen-bar{
    display:flex;
    align-items:center;
    gap:7px;
    padding:10px 13px;
    background:rgba(255,255,255,0.04);
    border-bottom:1px solid rgba(255,255,255,0.08);
  }
  .screen-bar i{
    width:7px;height:7px;border-radius:50%;
    display:inline-block;
  }
  .screen-bar i:nth-child(1){background:var(--red-2);}
  .screen-bar i:nth-child(2){background:#ffcf4d;}
  .screen-bar i:nth-child(3){background:var(--blue-2);}
  .screen-bar span{
    margin-left:auto;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.12em;
    color:#9aa3b5;
    text-transform:uppercase;
  }
  .screen-body{
    position:relative;
    aspect-ratio:16/10;
    max-height:230px;
  }
  .screen-body iframe{
    width:100%;height:100%;
    border:none;
    display:block;
    background:#0b0e14;
  }

  .hint{
    text-align:center;
    font-size:11.5px;
    color:var(--mist);
    margin:12px 24px 22px;
  }
  .hint b{color:var(--blue); font-weight:600;}

  @media (max-width:420px){
    .hero{padding:12px 20px 4px;}
    .header{padding:18px 20px 0;}
    .clock-row{padding:14px 20px 0;}
    .screen{margin:16px 20px 0;}
    .hint{margin:12px 20px 20px;}
  }

  @media (prefers-reduced-motion: reduce){
    .glow, .live-chip .r-dot, .eq span, .console{animation:none !important;}
  }
</style>
</head>
<body oncontextmenu="return false;">

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="console">
    <div class="header">
      <div class="brand-mark">
        <div class="dot-flag">93</div>
        <div>
          <div class="brand-text">Infinite Radio</div>
          <div class="brand-sub">Surigao City</div>
        </div>
      </div>
      <div class="live-chip"><span class="r-dot"></span>On Air</div>
    </div>

    <div class="clock-row">
      <span class="clock-time" id="clockTime">--:--:--</span>
      <span class="clock-date" id="clockDate">-- --- ----</span>
    </div>

    <div class="hero">
      <div class="freq-ticker">93.3 FM &nbsp;·&nbsp; STREAMING WORLDWIDE</div>
      <div class="station-title">Tune in to the <span>signal</span></div>
      <div class="station-loc">News · Talk · Music, live from Surigao</div>

      <div class="eq ambient" id="eq" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="screen">
      <div class="screen-bar">
        <i></i><i></i><i></i>
        <span>Live Player</span>
      </div>
      <div class="screen-body">
        <iframe id="playerFrame" src="https://vdo.ninja/?view=hSKAP98" allow="autoplay; microphone; camera" title="Infinite Radio live audio"></iframe>
      </div>
    </div>
    <div class="hint">Tap <b>play</b> on the player above to start listening.</div>
  </div>

<script>
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('selectstart', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());

  // live clock
  const timeEl = document.getElementById('clockTime');
  const dateEl = document.getElementById('clockDate');
  function tick(){
    const now = new Date();
    timeEl.textContent = now.toLocaleTimeString('en-PH', { hour12:true });
    dateEl.textContent = now.toLocaleDateString('en-PH', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
  }
  tick();
  setInterval(tick, 1000);

  // equalizer: try to react to real audio-level events posted by the player;
  // fall back to the ambient animation (already running via CSS) if none arrive.
  const eq = document.getElementById('eq');
  const bars = eq.querySelectorAll('span');
  let liveDataReceived = false;

  function applyLevel(level){
    // level expected 0-1
    if (!liveDataReceived){
      liveDataReceived = true;
      eq.classList.remove('ambient');
    }
    bars.forEach((bar, i) => {
      const jitter = 0.6 + Math.random() * 0.8;
      const h = Math.max(6, Math.min(32, level * 32 * jitter));
      bar.style.height = h + 'px';
    });
  }

  window.addEventListener('message', (event) => {
    const data = event.data;
    if (!data || typeof data !== 'object') return;
    const candidate = data.volume ?? data.level ?? data.audioLevel ?? data.value ?? (data.data && data.data.volume);
    if (typeof candidate === 'number'){
      const normalized = candidate > 1 ? candidate / 100 : candidate;
      applyLevel(normalized);
    }
  });

  // if no live audio-level messages arrive, bars keep the ambient CSS pulse indefinitely
</script>

</body>
</html>
