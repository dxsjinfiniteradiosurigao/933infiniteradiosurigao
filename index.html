<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>93.3 Infinite Radio Surigao — Listen Live</title>
<style>
  :root{
    --navy:#0B1F3A;
    --navy-deep:#071426;
    --flag-blue:#0038A8;
    --flag-red:#CE1126;
    --sun-gold:#FCD116;
    --white:#FFFFFF;
    --mist:#B9C4D6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  @font-face{
    font-family:'Local-Fallback';
    src:local('Arial');
  }
  body{
    background:
      radial-gradient(1200px 600px at 15% -10%, rgba(0,56,168,0.35), transparent 60%),
      radial-gradient(1000px 500px at 100% 110%, rgba(206,17,38,0.28), transparent 60%),
      var(--navy-deep);
    color:var(--white);
    font-family:'Barlow', 'Arial Narrow', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 18px;
    overflow-x:hidden;
  }
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600&display=swap');
  .station-name, .freq, h1, .tagline-label{font-family:'Barlow Condensed', 'Arial Narrow', sans-serif;}
  body, p, .now-label, .link-label{font-family:'Barlow', Arial, sans-serif;}

  .card{
    width:100%;
    max-width:480px;
    background:linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.015));
    border:1px solid rgba(255,255,255,0.09);
    border-radius:20px;
    padding:34px 30px 30px;
    position:relative;
    backdrop-filter:blur(6px);
    box-shadow:0 30px 60px rgba(0,0,0,0.45);
  }
  .card::before{
    content:"";
    position:absolute; top:0; left:24px; right:24px; height:3px;
    background:linear-gradient(90deg, var(--flag-blue) 0 33%, var(--white) 33% 66%, var(--flag-red) 66% 100%);
    border-radius:2px;
  }

  .top-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:22px;
  }
  .freq{
    font-weight:800;
    font-size:15px;
    letter-spacing:0.12em;
    color:var(--sun-gold);
  }
  .live-pill{
    display:flex; align-items:center; gap:7px;
    background:rgba(206,17,38,0.15);
    border:1px solid rgba(206,17,38,0.5);
    padding:5px 12px 5px 9px;
    border-radius:999px;
    font-size:12px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
  }
  .live-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--flag-red);
    box-shadow:0 0 0 rgba(206,17,38,0.6);
    animation:pulse 1.6s infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(206,17,38,0.55);}
    70%{box-shadow:0 0 0 9px rgba(206,17,38,0);}
    100%{box-shadow:0 0 0 0 rgba(206,17,38,0);}
  }

  .station-name{
    font-weight:800;
    font-size:34px;
    line-height:1.02;
    letter-spacing:0.01em;
    text-transform:uppercase;
  }
  .tagline{
    color:var(--mist);
    font-size:14px;
    margin-top:6px;
    margin-bottom:26px;
    letter-spacing:0.02em;
  }

  /* Dial / visualizer */
  .dial-wrap{
    display:flex;
    align-items:center;
    justify-content:center;
    margin:8px 0 26px;
    position:relative;
    height:150px;
  }
  .dial-ring{
    width:150px;height:150px;border-radius:50%;
    border:2px solid rgba(255,255,255,0.12);
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .dial-ring::before{
    content:"";
    position:absolute; inset:-2px;
    border-radius:50%;
    border:2px solid transparent;
    border-top-color:var(--flag-blue);
    border-right-color:var(--sun-gold);
    animation:spin 6s linear infinite;
    opacity:0.85;
  }
  .play-btn{
    width:104px;height:104px;border-radius:50%;
    background:linear-gradient(160deg, var(--flag-blue), #052a70);
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 10px 26px rgba(0,56,168,0.45), inset 0 0 0 1px rgba(255,255,255,0.15);
    transition:transform 0.15s ease, box-shadow 0.2s ease;
    position:relative;
    z-index:2;
  }
  .play-btn:hover{transform:scale(1.04);}
  .play-btn:active{transform:scale(0.97);}
  .play-btn svg{width:34px;height:34px;fill:var(--white); margin-left:4px;}
  .play-btn.playing svg{margin-left:0;}

  @keyframes spin{ to{ transform:rotate(360deg);} }

  .bars{
    position:absolute;
    bottom:8px; left:50%; transform:translateX(-50%);
    display:flex; align-items:flex-end; gap:3px; height:20px;
    opacity:0;
    transition:opacity 0.3s ease;
  }
  .bars.active{opacity:1;}
  .bars span{
    width:3px; background:var(--sun-gold); border-radius:2px;
    animation:bar 1s ease-in-out infinite;
  }
  .bars span:nth-child(1){animation-delay:0s; height:6px;}
  .bars span:nth-child(2){animation-delay:0.15s; height:14px;}
  .bars span:nth-child(3){animation-delay:0.3s; height:9px;}
  .bars span:nth-child(4){animation-delay:0.1s; height:18px;}
  .bars span:nth-child(5){animation-delay:0.25s; height:8px;}
  @keyframes bar{
    0%,100%{transform:scaleY(0.4);}
    50%{transform:scaleY(1);}
  }

  .now-label{
    text-align:center;
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--mist);
    margin-bottom:4px;
  }
  .now-status{
    text-align:center;
    font-size:15px;
    font-weight:600;
    margin-bottom:26px;
  }

  .share-row{
    display:flex; gap:10px;
  }
  .share-btn{
    flex:1;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.14);
    color:var(--white);
    padding:11px 10px;
    border-radius:11px;
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:7px;
    transition:background 0.15s ease, border-color 0.15s ease;
  }
  .share-btn:hover{background:rgba(255,255,255,0.11); border-color:rgba(255,255,255,0.28);}
  .share-btn svg{width:15px;height:15px; fill:var(--white); flex-shrink:0;}

  .foot{
    margin-top:22px;
    text-align:center;
    font-size:11.5px;
    color:rgba(185,196,214,0.65);
    letter-spacing:0.03em;
  }

  .player-shell{
    max-height:0;
    overflow:hidden;
    border-radius:12px;
    margin-bottom:0;
    transition:max-height 0.35s ease, margin-bottom 0.35s ease;
    border:1px solid rgba(255,255,255,0.12);
  }
  .player-shell.open{
    max-height:220px;
    margin-bottom:18px;
  }
  .player-shell iframe{
    width:100%;
    height:200px;
    border:none;
    display:block;
    background:#000;
  }
  .player-hint{
    text-align:center;
    font-size:11.5px;
    color:var(--mist);
    margin:-4px 0 14px;
  }

  @media (prefers-reduced-motion: reduce){
    .live-dot, .dial-ring::before, .bars span{animation:none !important;}
  }
</style>
</head>
<body>

  <div class="card">
    <div class="top-row">
      <div class="freq">93.3 FM</div>
      <div class="live-pill"><span class="live-dot"></span>ON AIR</div>
    </div>

    <div class="station-name">Infinite Radio</div>
    <div class="tagline">Surigao City · Streaming worldwide</div>

    <div class="dial-wrap">
      <div class="dial-ring">
        <button class="play-btn" id="playBtn" aria-label="Play live stream">
          <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
      </div>
      <div class="bars" id="bars">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
    </div>

    <div class="now-label">Status</div>
    <div class="now-status" id="statusText">Tap play to listen live</div>

    <div class="player-shell" id="playerShell">
      <iframe id="playerFrame" allow="autoplay; microphone; camera" title="Infinite Radio live audio"></iframe>
    </div>
    <div class="player-hint" id="playerHint" style="display:none;">If sound doesn't start, tap the play button inside the player above.</div>

    <div class="share-row">
      <button class="share-btn" id="copyBtn">
        <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        Copy link
      </button>
      <a class="share-btn" href="https://vdo.ninja/?view=hSKAP98" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7zM5 5h5V3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-5h-2v5H5V5z"/></svg>
        Open direct
      </a>
    </div>

    <div class="foot">93.3 Infinite Radio Surigao &nbsp;·&nbsp; Live audio feed</div>
  </div>

<script>
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const bars = document.getElementById('bars');
  const statusText = document.getElementById('statusText');
  const frame = document.getElementById('playerFrame');
  const shell = document.getElementById('playerShell');
  const hint = document.getElementById('playerHint');
  const copyBtn = document.getElementById('copyBtn');

  const STREAM_URL = "https://vdo.ninja/?view=hSKAP98&cleanoutput";

  const pauseSVG = '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>';
  const playSVG = '<path d="M8 5v14l11-7z"/>';

  let playing = false;

  playBtn.addEventListener('click', () => {
    if (!playing) {
      frame.src = STREAM_URL;
      shell.classList.add('open');
      hint.style.display = 'block';
      statusText.textContent = "Player loaded — tap play below";
      playIcon.innerHTML = pauseSVG;
      playBtn.classList.add('playing');
      bars.classList.add('active');
      playing = true;
    } else {
      frame.src = "";
      shell.classList.remove('open');
      hint.style.display = 'none';
      statusText.textContent = "Tap play to listen live";
      playIcon.innerHTML = playSVG;
      playBtn.classList.remove('playing');
      bars.classList.remove('active');
      playing = false;
    }
  });

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const original = copyBtn.innerHTML;
      copyBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg> Copied';
      setTimeout(() => { copyBtn.innerHTML = original; }, 1800);
    });
  });
</script>

</body>
</html>
